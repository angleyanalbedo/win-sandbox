name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o wsandbox-vm.exe -ldflags="-s -w" .

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path wsandbox-vm.exe -DestinationPath wsandbox-vm-windows-amd64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wsandbox-vm-windows-amd64.zip
          generate_release_notes: true
